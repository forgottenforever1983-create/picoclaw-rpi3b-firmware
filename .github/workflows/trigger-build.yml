name: Build Firmware

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Create package
        run: |
          echo "Building PicoClaw RPI3B+ firmware package..."
          tar -czvf picoclaw-rpi3b-firmware.tar.gz config layer build.sh
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-package
          path: picoclaw-rpi3b-firmware.tar.gz

      - name: Create Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v1.0.0
          release_name: PicoClaw RPI3B+ Firmware v1.0.0
          draft: false
          prerelease: false

      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./picoclaw-rpi3b-firmware.tar.gz
          asset_name: picoclaw-rpi3b-firmware.tar.gz
          asset_content_type: application/gzip