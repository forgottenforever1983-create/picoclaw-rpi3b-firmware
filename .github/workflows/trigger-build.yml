name: Build Firmware

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create package
        run: |
          tar -czvf picoclaw-rpi3b-firmware.tar.gz config layer build.sh README.md

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-rpi3b-firmware
          path: picoclaw-rpi3b-firmware.tar.gz
          retention-days: 30