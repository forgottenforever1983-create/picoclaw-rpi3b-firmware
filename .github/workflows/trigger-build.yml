name: Build Firmware

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create package
        run: |
          echo "Building PicoClaw RPI3B+ firmware package..."
          tar -czvf picoclaw-rpi3b-firmware.tar.gz config layer build.sh
          ls -la

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-package
          path: picoclaw-rpi3b-firmware.tar.gz

      - name: Create Release
        run: |
          RESPONSE=$(curl -s -X POST https://api.github.com/repos/${{ github.repository }}/releases \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d '{
              "tag_name": "v1.0.0",
              "name": "PicoClaw RPI3B+ Firmware v1.0.0",
              "draft": false,
              "prerelease": false
            }')
          echo "upload_url=$(echo $RESPONSE | jq -r '.upload_url')" >> $GITHUB_OUTPUT

      - name: Upload Release Asset
        run: |
          UPLOAD_URL=$(cat $GITHUB_OUTPUT | grep upload_url | cut -d= -f2)
          curl -s -X POST "${UPLOAD_URL}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/gzip" \
            --data-binary @picoclaw-rpi3b-firmware.tar.gz