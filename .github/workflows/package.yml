name: Package Firmware Build Files

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags:
      - 'v*'

jobs:
  package:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create build archive
        run: |
          # Create a clean archive without .git
          tar --exclude='.git*' --exclude='*.img' -czvf picoclaw-rpi3b-firmware.tar.gz \
            config/ \
            layer/ \
            build.sh \
            README.md \
            QUICKREF.txt

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: picoclaw-rpi3b-firmware
          path: picoclaw-rpi3b-firmware.tar.gz

  release:
    runs-on: ubuntu-latest
    needs: package
    permissions:
      contents: write
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: picoclaw-rpi3b-firmware

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: PicoClaw RPI3B+ Firmware v1.0
          tag_name: v1.0.0
          draft: true
          files: |
            picoclaw-rpi3b-firmware.tar.gz
          body: |
            # PicoClaw Raspberry Pi 3B+ Firmware
            
            ## What's Included
            - PicoClaw AI Assistant (latest from source)
            - 5 pre-configured LLM providers (OpenRouter with API key)
            - Custom skills & agents
            - WiFi: Athena-Da-God1 / 12345678
            - Static IP: 192.168.1.100
            
            ## Build Instructions
            
            1. Extract: `tar -xzvf picoclaw-rpi3b-firmware.tar.gz`
            2. On Raspberry Pi 4/5 or Debian arm64 VM:
            ```bash
            cd picoclaw-rpi3b-firmware
            chmod +x build.sh
            sudo ./build.sh
            ```
            
            3. Output: `rpi-image-gen/work/image-*/deb12-arm64-*.img`
            
            4. Flash to SD card with Raspberry Pi Imager
            
            ## Quick Start
            - SSH: `ssh pi@192.168.1.100` (password: raspberry)
            - Run: `picoclaw-start` or `picoclaw agent -m "Hello"`
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}